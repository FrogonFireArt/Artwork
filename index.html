<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frog on Fire — Portfolio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HEADER ────────────────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="logo-wrap">
      <!--
        LOGO: Replace  src="images/logo.svg"  with the path to your own logo file.
        Recommended format: SVG or PNG with a transparent background.
        You can control the display size in style.css under  .logo-image
      -->
      <img class="logo-image" src="images/logo.svg" alt="Frog on Fire">
    </div>
  </header>

  <!-- ── FILTER BAR (outside page-content so it never scrolls away) ──────── -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all" onclick="filterCat(this)">
      All<span class="filter-count" id="count-all"></span>
    </button>
    <button class="filter-btn" data-cat="Pixel Art" onclick="filterCat(this)">
      Pixel Art<span class="filter-count" id="count-Pixel Art"></span>
    </button>
    <button class="filter-btn" data-cat="2D" onclick="filterCat(this)">
      2D<span class="filter-count" id="count-2D"></span>
    </button>
    <button class="filter-btn" data-cat="Animation" onclick="filterCat(this)">
      Animation<span class="filter-count" id="count-Animation"></span>
    </button>
    <button class="filter-btn" data-cat="Commission" onclick="filterCat(this)">
      Commission<span class="filter-count" id="count-Commission"></span>
    </button>
    <button class="filter-btn" data-cat="UI" onclick="filterCat(this)">
      UI<span class="filter-count" id="count-UI"></span>
    </button>
    <!--
      TO ADD A NEW CATEGORY:
      Copy one of the buttons above, change data-cat="" and the label text.
      Then add artworks in artworks.js with the matching category value.
    -->
  </div>
  <div class="filter-divider"></div>

  <!-- ── PAGE CONTENT (blurs when lightbox is open, scrolls independently) ── -->
  <div id="page-content" class="page-content">

    <!-- Gallery grid -->
    <div class="gallery" id="gallery"></div>
    <p class="empty-state" id="emptyState">No artwork in this category yet.</p>

  </div><!-- end #page-content -->

  <!-- ── LIGHTBOX (outside page-content so it doesn't get blurred) ─────── -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-inner">
      <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
      <button class="lightbox-nav lightbox-nav--prev" onclick="navigateLightbox(event, -1)">&#8592;</button>
      <button class="lightbox-nav lightbox-nav--next" onclick="navigateLightbox(event,  1)">&#8594;</button>
      <div class="lightbox-media-wrap" id="lbMedia"></div>
      <div class="lightbox-info">
        <p class="lightbox-title" id="lbTitle"></p>
        <p class="lightbox-category" id="lbCat"></p>
        <p class="lightbox-description" id="lbDesc"></p>
      </div>
    </div>
  </div>

  <!-- ── FOOTER ────────────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <!-- CHANGE: update the name and year as needed -->
    <p class="footer-copyright">&copy; 2025 Frog on Fire. All rights reserved.</p>
    <div class="social-links">

      <!-- ArtStation — CHANGE href to your profile URL -->
      <a class="social-link" href="https://www.artstation.com" target="_blank" rel="noopener" title="ArtStation">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 377.4l43 74.3A51.35 51.35 0 0 0 90.9 480h285.4l-59.2-102.6zM501.8 350L335.6 59.3A51.38 51.38 0 0 0 290.2 32h-88.4l257.3 447.6 40.7-70.5c1.9-3.2 21-29.7 2-59.1zM275 304.5l-115.5-200L44 304.5z"/>
        </svg>
      </a>

      <!-- X / Twitter — CHANGE href to your profile URL -->
      <a class="social-link" href="https://x.com" target="_blank" rel="noopener" title="X / Twitter">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>

      <!-- Instagram — CHANGE href to your profile URL -->
      <a class="social-link" href="https://www.instagram.com" target="_blank" rel="noopener" title="Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
      </a>

      <!-- Email — CHANGE data-email to your actual email address -->
      <button class="social-link" onclick="copyEmail(this)" data-email="placeholderemail@gmail.com" title="Copy email address">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
      </button>

    </div>
  </footer>

  <!-- Email copied feedback toast -->
  <div class="copy-toast" id="copyToast">Email copied!</div>

  <!-- Scripts — artworks.js first so gallery.js can read the ARTWORKS array -->
  <script src="artworks.js"></script>
  <script src="gallery.js"></script>

</body>
</html>
